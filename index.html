<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eee5ff">
  <title>微光陪伴｜生活状态记录</title>
  <style>
    :root {
      --ink: #34265f;
      --muted: #817895;
      --purple: #8064d9;
      --purple-2: #a58ee6;
      --lavender: #eee8ff;
      --cream: rgba(255, 251, 246, .92);
      --line: rgba(102, 82, 145, .14);
      --peach: #ffd6bf;
      --rose: #dc6d77;
      --green: #56875e;
      --shadow: 0 12px 36px rgba(83, 61, 124, .10);
      --radius: 22px;
      --pad: 18px;
      --body-line: 1.62;
    }

    * { box-sizing: border-box; }
    html { background: #e9e0fb; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 72% 8%, rgba(255,245,201,.82), transparent 22%),
        radial-gradient(circle at 12% 22%, rgba(205,190,245,.88), transparent 30%),
        linear-gradient(180deg, #efe8ff 0%, #fff1e9 48%, #eee7ff 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, textarea, select { font: inherit; }
    button { color: inherit; }

    .app {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 0 16px max(30px, env(safe-area-inset-bottom));
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #eee5fb 0%, #e3d0e9 31%, #f1dfe4 58%, #eee6fb 100%);
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      z-index: 0;
      border-radius: 999px;
      filter: blur(2px);
      pointer-events: none;
    }
    .app::before { width: 170px; height: 170px; background: rgba(255,231,188,.45); top: 88px; right: -82px; }
    .app::after { width: 150px; height: 150px; background: rgba(193,174,239,.28); top: 360px; left: -95px; }
    .app > * { position: relative; z-index: 1; }
    .app::before, .app::after { display: none; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 4px;
      margin: 0;
      position: absolute;
      top: max(8px, env(safe-area-inset-top));
      left: 16px;
      right: 16px;
      z-index: 20;
    }

    .tab {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 7px 4px;
      font-size: 15px;
      cursor: pointer;
      transition: .2s ease;
    }
    .tab.active {
      color: white;
      background: linear-gradient(135deg, #9478e2, #7357cc);
      box-shadow: 0 5px 16px rgba(100, 74, 178, .22);
    }

    .view { display: none; }
    .view.active { display: block; animation: fade .22s ease; }
    .view:not(#home) { padding-top: 70px; }
    @keyframes fade { from { opacity: 0; transform: translateY(3px); } }

    .hero {
      position: relative;
      margin: 0 -16px -24px;
      padding: 0;
    }
    .hero-art {
      position: relative;
      width: 100%;
      overflow: visible;
    }
    .hero-art > img {
      display: block;
      width: 100%;
      height: auto;
      -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 96%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 0%, #000 96%, transparent 100%);
    }
    .hero-title {
      position: absolute;
      top: 19%;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      color: #342568;
      font-size: clamp(22px, 5.7vw, 29px);
      font-weight: 750;
      letter-spacing: .015em;
      line-height: 1.25;
      white-space: nowrap;
    }
    .voice-hotspot {
      position: absolute;
      width: 31%;
      aspect-ratio: 1;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -50%);
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: #3c2a55;
      padding: 0;
      text-align: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .voice-hotspot svg { display: block; flex: 0 0 auto; width: 43px; height: 43px; color: white; filter: drop-shadow(0 2px 3px rgba(133,87,34,.08)); }
    .voice-hotspot span { display: block; width: 100%; font-size: clamp(12px, 3.2vw, 15px); font-weight: 650; white-space: nowrap; line-height: 1.15; }
    .voice-hotspot:focus-visible { outline: 3px solid rgba(116,82,201,.75); outline-offset: 5px; }
    .voice-hotspot.listening { animation: watercolorPulse 1.15s infinite; }
    @keyframes watercolorPulse { 50% { box-shadow: 0 0 0 12px rgba(255,177,78,.22), 0 0 45px rgba(255,170,74,.50); } }
    .hero-helper {
      position: absolute;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%);
      margin: 0;
      color: #7a7191;
      font-size: clamp(11px, 2.8vw, 13px);
      line-height: 1;
      white-space: nowrap;
      transition: opacity .18s ease;
    }
    .hero-helper.hidden { opacity: 0; }
    .voice-status {
      position: absolute;
      left: 50%;
      bottom: 12.5%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 90%;
      margin: 0;
      padding: 6px 11px;
      border-radius: 999px;
      color: white;
      background: rgba(76,55,120,.82);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .voice-status.show { opacity: 1; }

    .card {
      background: var(--cream);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--pad);
      margin-bottom: 14px;
      backdrop-filter: blur(13px);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      margin-bottom: 10px;
    }
    .title-wrap { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      flex: 0 0 auto;
    }
    .health .icon { background: #e8f1dc; color: var(--green); }
    .mood .icon { background: #ffe3e3; color: var(--rose); }
    .card h2, .card h3 { margin: 0; }
    .card h2 { font-size: 19px; letter-spacing: .02em; }

    .small-btn, .primary-btn, .secondary-btn {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      transition: .18s ease;
    }
    .small-btn {
      padding: 8px 13px;
      color: white;
      background: linear-gradient(135deg, #9a7ee2, #7255ca);
      box-shadow: 0 5px 14px rgba(104,79,176,.18);
      white-space: nowrap;
    }
    .small-btn:active, .primary-btn:active { transform: translateY(1px); }

    .recent-label { color: var(--muted); font-size: 13px; margin-bottom: 2px; }
    .record-list { margin-top: 2px; border-top: 1px solid var(--line); }
    .record-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      min-height: 58px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .dash { width: 9px; height: 1px; background: #aaa2b8; }
    .record-text {
      min-width: 0;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .record-time { color: #9890a9; font-size: 11px; white-space: nowrap; }
    .record-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .delete-record {
      border: 0;
      background: transparent;
      color: #a58eaa;
      padding: 0;
      font-size: 11px;
      cursor: pointer;
    }
    .delete-record:hover { color: #c05260; }
    .card-foot { display: flex; justify-content: flex-end; padding-top: 9px; }
    .link-btn { border: 0; background: transparent; color: #7258ca; padding: 2px 0; cursor: pointer; font-size: 13px; }

    .empty {
      min-height: 116px;
      display: grid;
      place-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .summary-card { padding-bottom: 14px; }
    .periods { display: flex; gap: 5px; }
    .period {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 8px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .period.active { background: #8970d7; color: white; }

    .letter {
      position: relative;
      border-radius: 17px;
      padding: 15px 86px 15px 15px;
      min-height: 132px;
      margin-top: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .letter.health-letter { background: rgba(244,248,231,.86); border: 1px solid rgba(124,155,91,.30); }
    .letter.mood-letter { background: rgba(255,241,240,.86); border: 1px solid rgba(220,125,133,.24); }
    .letter h3 { font-size: 16px; margin-bottom: 7px; }
    .health-letter h3 { color: #477c4e; }
    .mood-letter h3 { color: #c05260; }
    .letter p {
      margin: 0;
      font-size: 14px;
      line-height: 1.68;
      color: #4b4554;
      text-wrap: pretty;
    }
    .letter-art {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 68px;
      height: auto;
      opacity: .94;
      mix-blend-mode: normal;
    }
    mark { color: inherit; background: linear-gradient(transparent 62%, rgba(255,196,112,.43) 62%); padding: 0 1px; }

    .primary-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px 18px;
      color: white;
      font-weight: 700;
      background: linear-gradient(90deg, #8d73dc, #6f54c5);
      box-shadow: 0 7px 20px rgba(100,75,175,.22);
    }
    .disclaimer { text-align: center; font-size: 11px; color: #837a94; line-height: 1.6; padding: 0 20px; }

    .page-title { padding: 11px 3px 14px; }
    .page-title h1 { font-size: 24px; margin: 0 0 5px; }
    .page-title p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .filter-row { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.48);
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
    }
    .filter.active { background: #8064d9; color: white; border-color: transparent; }

    .timeline-row { display: grid; grid-template-columns: 72px 1fr; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .timeline-row:last-child { border-bottom: 0; }
    .timeline-time { color: var(--muted); font-size: 11px; padding-top: 2px; line-height: 1.5; }
    .timeline-content { font-size: 14px; line-height: 1.6; }
    .timeline-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .category-badge { display: inline-block; font-size: 11px; color: #7158c3; background: #eee8ff; padding: 3px 7px; border-radius: 999px; margin-top: 6px; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat { background: rgba(255,255,255,.58); border: 1px solid var(--line); border-radius: 16px; padding: 15px; }
    .stat strong { display: block; font-size: 25px; margin-bottom: 3px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .keyword-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .keyword { padding: 7px 10px; border-radius: 999px; background: #f0ebff; font-size: 12px; }

    dialog {
      width: min(calc(100% - 28px), 450px);
      border: 0;
      padding: 0;
      border-radius: 24px;
      color: var(--ink);
      box-shadow: 0 20px 80px rgba(47,33,80,.32);
      background: #fffaf8;
    }
    dialog::backdrop { background: rgba(42,31,69,.46); backdrop-filter: blur(5px); }
    .modal { padding: 20px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .modal-head h2 { margin: 0; font-size: 20px; }
    .close { width: 34px; height: 34px; border: 0; border-radius: 50%; background: #f0eafb; cursor: pointer; }
    textarea {
      width: 100%;
      min-height: 126px;
      resize: vertical;
      border: 1px solid #ddd4ea;
      border-radius: 16px;
      padding: 13px;
      color: var(--ink);
      background: white;
      outline: none;
      line-height: 1.65;
    }
    textarea:focus { border-color: #8b70d7; box-shadow: 0 0 0 3px rgba(126,98,208,.10); }
    .modal-actions { display: grid; grid-template-columns: 1fr 1.5fr; gap: 9px; margin-top: 12px; }
    .secondary-btn { border: 1px solid #d8cfe8; background: white; padding: 11px; }
    .preview { margin-top: 12px; display: grid; gap: 7px; }
    .preview-item { border: 1px solid var(--line); border-radius: 13px; padding: 10px; font-size: 13px; line-height: 1.55; background: rgba(245,241,255,.65); }
    .preview-item small { display: block; color: #8064d9; margin-bottom: 2px; }
    .hint { color: var(--muted); font-size: 11px; line-height: 1.55; margin: 8px 1px 0; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translate(-50%, 20px);
      background: rgba(50,38,81,.92);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      z-index: 50;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 380px) {
      :root { --pad: 15px; }
      .app { padding-left: 11px; padding-right: 11px; }
      .record-row { grid-template-columns: 8px minmax(0, 1fr); }
      .record-meta { grid-column: 2; align-items: flex-start; flex-direction: row; gap: 10px; margin-top: -4px; }
      .letter { padding-right: 72px; }
      .letter-art { width: 52px; right: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>

  <script>
    const STORAGE_KEY = 'glimmer-life-records-v1';
    const state = {
      records: JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'),
      filter: 'all',
      months: 1,
      preset: 'auto',
      recognition: null,
      listening: false,
      releaseRequested: false,
      voiceTranscript: '',
      voiceFailed: false,
      pressStartedAt: 0
    };

    const dictionaries = {
      health: ['咳嗽','喷嚏','湿疹','过敏','头疼','胃痛','不舒服','难受','睡眠','熬夜','早睡','咖啡','冰','发烧','鼻塞','皮肤','疼','痒','饮食','没吃饭','运动','爬山','户外'],
      mood: ['开心','高兴','愉悦','快乐','沮丧','难过','生气','烦','焦虑','心情','压力','放松','舒展','委屈','拖延','完成计划','成就感','爬山','户外','吃好吃的'],
      positive: ['舒服','开心','高兴','愉悦','快乐','放松','舒展','改善','减少','较少','很好','完成','早睡','爬山','户外','好吃'],
      negative: ['不舒服','咳嗽','喷嚏','湿疹','疼','痒','沮丧','难过','生气','焦虑','压力','拖延','熬夜','睡眠不好','睡眠不足','没吃饭']
    };

    const factorMatchers = [
      ['爬山 / 户外', /爬山|户外|新鲜空气/], ['冰咖啡', /冰咖啡|冰饮/], ['咖啡', /咖啡/],
      ['熬夜', /熬夜|晚睡/], ['早睡', /早睡/], ['睡眠不足', /睡眠不好|睡眠不足|没睡好/],
      ['吃好吃的', /好吃|美食|大餐/], ['工作拖延', /拖延|消极怠工|工作没完成/],
      ['完成计划', /完成计划|按时完成|做完/], ['没按时吃饭', /没吃饭|空腹|没按时吃/],
      ['运动', /运动|游泳|跑步|健身/]
    ];

    const $ = (s, root = document) => root.querySelector(s);
    const $$ = (s, root = document) => [...root.querySelectorAll(s)];
    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));

    function formatTime(iso, short = false) {
      const d = new Date(iso);
      const now = new Date();
      const sameYear = d.getFullYear() === now.getFullYear();
      const date = sameYear ? `${d.getMonth()+1}月${d.getDate()}日` : `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
      const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return short ? `${date} ${time}` : `${date}\n${time}`;
    }

    function splitInput(text) {
      return text.split(/[；;。\n]+/).map(s => s.trim()).filter(Boolean);
    }

    function countHits(text, words) { return words.reduce((n, word) => n + (text.includes(word) ? 1 : 0), 0); }

    function classify(text, preset = 'auto') {
      let health = countHits(text, dictionaries.health);
      let mood = countHits(text, dictionaries.mood);
      if (preset === 'health') health += 2;
      if (preset === 'mood') mood += 2;
      const category = health && mood ? 'both' : health ? 'health' : mood ? 'mood' : (preset === 'auto' ? 'mood' : preset);
      const pos = countHits(text, dictionaries.positive);
      const neg = countHits(text, dictionaries.negative);
      const effect = pos > neg ? 'positive' : neg > pos ? 'negative' : 'neutral';
      const factors = factorMatchers.filter(([, re]) => re.test(text)).map(([name]) => name);
      return { category, effect, factors };
    }

    function createRecords(text, preset) {
      return splitInput(text).map(part => ({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        text: part,
        ...classify(part, preset),
        createdAt: new Date().toISOString()
      }));
    }

    function categoryLabel(category) { return category === 'health' ? '健康' : category === 'mood' ? '心情' : '健康＋心情'; }
    function isCategory(record, category) { return record.category === category || record.category === 'both'; }

    function recentRows(category) {
      const rows = state.records.filter(r => isCategory(r, category)).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,2);
      if (!rows.length) return `<div class="empty">还没有${category === 'health' ? '健康' : '心情'}记录<br>点击“记录”写下第一个片段</div>`;
      return rows.map(r => `<div class="record-row"><span class="dash"></span><span class="record-text">${escapeHtml(r.text)}</span><span class="record-meta"><time class="record-time">${formatTime(r.createdAt, true)}</time><button class="delete-record" data-id="${r.id}" aria-label="删除这条记录">删除</button></span></div>`).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
    }

    function recordsInRange(months) {
      const start = new Date(); start.setMonth(start.getMonth() - months);
      return state.records.filter(r => new Date(r.createdAt) >= start);
    }

    function frequency(records, category, effect) {
      const map = new Map();
      records.filter(r => isCategory(r, category) && r.effect === effect).forEach(r => {
        r.factors.forEach(f => map.set(f, (map.get(f) || 0) + 1));
      });
      return [...map.entries()].sort((a,b) => b[1]-a[1]);
    }

    function joinNatural(items, fallback) {
      if (!items.length) return fallback;
      return items.slice(0,2).map(([name,count]) => `<mark>${name}${count > 1 ? `（${count}次）` : ''}</mark>`).join('和');
    }

    function buildSummary(months) {
      const records = recordsInRange(months);
      const hp = frequency(records, 'health', 'positive');
      const hn = frequency(records, 'health', 'negative');
      const mp = frequency(records, 'mood', 'positive');
      const mn = frequency(records, 'mood', 'negative');
      const period = months === 1 ? '这一个月' : months === 3 ? '近三个月' : '近半年';

      const healthText = !records.filter(r => isCategory(r,'health')).length
        ? `${period}还没有足够的健康片段。继续记录身体反应和此前发生的事情，线索会慢慢清晰起来。`
        : `${period}，${joinNatural(hp,'暂时没有反复出现的事项')}之后，你更常记录到舒服或有所改善；而${joinNatural(hn,'暂时没有明显集中的事项')}之后，不适更容易出现。它们只是可能相关，值得继续留意。`;
      const moodText = !records.filter(r => isCategory(r,'mood')).length
        ? `${period}还没有足够的心情片段。开心和不开心的时刻都可以记录，不需要给整天打分。`
        : `${period}，${joinNatural(mp,'一些尚未形成规律的小事')}更常让你感到开心或放松；${joinNatural(mn,'暂时没有明显集中的事项')}则更容易伴随低落。可以多给自己安排前一种体验。`;

      return `

    function renderHome() {
      $('#healthRecent').innerHTML = recentRows('health');
      $('#moodRecent').innerHTML = recentRows('mood');
      $('#homeSummary').innerHTML = buildSummary(state.months);
      $('#fullSummary').innerHTML = buildSummary(state.months);
    }

    function renderRecords() {
      const records = state.records
        .filter(r => state.filter === 'all' || isCategory(r, state.filter))
        .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
      $('#allRecords').innerHTML = records.length ? records.map(r => `
        <div class="timeline-row">
          <time class="timeline-time">${formatTime(r.createdAt).replace('\n','<br>')}</time>
          <div class="timeline-content"><div class="timeline-main"><span>${escapeHtml(r.text)}</span><button class="delete-record" data-id="${r.id}" aria-label="删除这条记录">删除</button></div><span class="category-badge">${categoryLabel(r.category)}</span></div>
        </div>`).join('') : '<div class="empty">这里还没有记录</div>';
    }

    function renderStats() {
      const health = state.records.filter(r => isCategory(r,'health')).length;
      const mood = state.records.filter(r => isCategory(r,'mood')).length;
      const days = new Set(state.records.map(r => new Date(r.createdAt).toDateString())).size;
      $('#statsGrid').innerHTML = `
        <div class="stat"><strong>${state.records.length}</strong><span>记录片段</span></div>
        <div class="stat"><strong>${days}</strong><span>有记录的天数</span></div>
        <div class="stat"><strong>${health}</strong><span>健康相关</span></div>
        <div class="stat"><strong>${mood}</strong><span>心情相关</span></div>`;
      const counts = new Map();
      state.records.forEach(r => r.factors.forEach(f => counts.set(f,(counts.get(f)||0)+1)));
      const words = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);
      $('#keywordList').innerHTML = words.length ? words.map(([w,n]) => `<span class="keyword">${w} · ${n}次</span>`).join('') : '<span class="hint">记录积累后，这里会显示经常被提到的事情。</span>';
    }

    function render() { renderHome(); renderRecords(); renderStats(); }

    function openComposer(preset = 'auto') {
      state.preset = preset;
      $('#recordText').value = '';
      $('#classificationPreview').innerHTML = '';
      $('#recordDialog').showModal();
      setTimeout(() => $('#recordText').focus(), 80);
    }

    function updatePreview() {
      const text = $('#recordText').value.trim();
      const parts = text ? splitInput(text) : [];
      $('#classificationPreview').innerHTML = parts.map(part => {
        const c = classify(part, state.preset);
        return `<div class="preview-item"><small>${categoryLabel(c.category)} · ${c.effect === 'positive' ? '偏正向' : c.effect === 'negative' ? '偏负向' : '暂不判断'}</small>${escapeHtml(part)}</div>`;
      }).join('');
    }

    function showToast(message) {
      const toast = $('#toast'); toast.textContent = message; toast.classList.add('show');
      clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function setVoiceStatus(message, show = true) {
      const hint = $('#voiceHint');
      hint.textContent = message;
      hint.classList.toggle('show', show);
      $('.hero-helper').classList.toggle('hidden', show);
    }

    function commitVoiceRecord(text) {
      const clean = text.trim();
      if (!clean) { showToast('没有识别到内容，请重新长按说话'); return; }
      const created = createRecords(clean, 'auto');
      state.records.push(...created);
      save();
      render();
      showToast(`已自动分类并保存 ${created.length} 条记录`);
    }

    function startHoldToTalk(event) {
      if (event.type === 'pointerdown' && event.button !== 0) return;
      event.preventDefault();
      if (state.listening || state.recognition) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { showToast('当前浏览器不支持语音识别，可使用“＋记录”输入文字'); return; }

      const button = $('#voiceButton');
      if (event.pointerId !== undefined) {
        try { button.setPointerCapture(event.pointerId); } catch (_) {}
      }

      state.releaseRequested = false;
      state.voiceTranscript = '';
      state.voiceFailed = false;
      state.pressStartedAt = performance.now();

      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      state.recognition = recognition;

      recognition.onstart = () => {
        state.listening = true;
        button.classList.add('listening');
        setVoiceStatus('正在听…松手后自动保存');
        if (state.releaseRequested) {
          try { recognition.stop(); } catch (_) {}
        }
      };
      recognition.onresult = e => {
        let finalText = '';
        let interimText = '';
        for (let i = 0; i < e.results.length; i++) {
          const transcript = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalText += transcript;
          else interimText += transcript;
        }
        state.voiceTranscript = (finalText + interimText).trim();
        const preview = state.voiceTranscript;
        setVoiceStatus(preview ? `正在听：${preview.slice(-18)}${preview.length > 18 ? '…' : ''}` : '正在听…松手后自动保存');
      };
      recognition.onerror = e => {
        if (e.error === 'aborted') return;
        state.voiceFailed = true;
        showToast(e.error === 'not-allowed' ? '请允许浏览器使用麦克风' : '语音识别中断，请重新长按说话');
      };
      recognition.onend = () => {
        const duration = performance.now() - state.pressStartedAt;
        const transcript = state.voiceTranscript;
        const failed = state.voiceFailed;
        state.listening = false;
        state.recognition = null;
        button.classList.remove('listening');
        setVoiceStatus('', false);
        if (!failed && duration >= 300) commitVoiceRecord(transcript);
        else if (!failed) showToast('请长按麦克风说话');
      };

      try { recognition.start(); }
      catch (_) {
        state.recognition = null;
        showToast('语音功能正在忙，请稍后重试');
      }
    }

    function stopHoldToTalk(event) {
      event.preventDefault();
      state.releaseRequested = true;
      if (state.recognition && state.listening) {
        try { state.recognition.stop(); } catch (_) {}
      }
    }

    function deleteRecord(id) {
      const index = state.records.findIndex(record => record.id === id);
      if (index < 0) return;
      state.records.splice(index, 1);
      save();
      render();
      showToast('记录已删除');
    }

    $$('.tab').forEach(tab => tab.addEventListener('click', () => {
      $$('.tab').forEach(t => t.classList.toggle('active', t === tab));
      $$('.view').forEach(v => v.classList.toggle('active', v.id === tab.dataset.view));
      window.scrollTo({top:0, behavior:'smooth'});
    }));

    $$('.add-record').forEach(btn => btn.addEventListener('click', () => openComposer(btn.dataset.preset)));
    $$('.see-more').forEach(btn => btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter;
      $$('.filter').forEach(f => f.classList.toggle('active', f.dataset.filter === state.filter));
      $('.tab[data-view="records"]').click(); renderRecords();
    }));
    $$('.filter').forEach(btn => btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter; $$('.filter').forEach(f => f.classList.toggle('active', f === btn)); renderRecords();
    }));

    $$('.period').forEach(btn => btn.addEventListener('click', () => {
      state.months = Number(btn.dataset.months);
      $$('.period').forEach(p => p.classList.toggle('active', Number(p.dataset.months) === state.months));
      renderHome();
    }));

    const voiceButton = $('#voiceButton');
    voiceButton.addEventListener('pointerdown', startHoldToTalk);
    voiceButton.addEventListener('pointerup', stopHoldToTalk);
    voiceButton.addEventListener('pointercancel', stopHoldToTalk);
    voiceButton.addEventListener('contextmenu', e => e.preventDefault());
    voiceButton.addEventListener('click', e => e.preventDefault());
    voiceButton.addEventListener('keydown', e => {
      if ((e.key === ' ' || e.key === 'Enter') && !e.repeat) startHoldToTalk(e);
    });
    voiceButton.addEventListener('keyup', e => {
      if (e.key === ' ' || e.key === 'Enter') stopHoldToTalk(e);
    });

    $('#closeDialog').addEventListener('click', () => $('#recordDialog').close());
    $('#cancelRecord').addEventListener('click', () => $('#recordDialog').close());
    $('#recordDialog').addEventListener('click', e => {
      const dialog = $('#recordDialog');
      const rect = dialog.getBoundingClientRect();
      const inside = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
      if (!inside) dialog.close();
    });
    document.addEventListener('click', e => {
      const button = e.target.closest('.delete-record');
      if (!button) return;
      e.preventDefault();
      deleteRecord(button.dataset.id);
    });
    $('#recordText').addEventListener('input', updatePreview);
    $('#recordForm').addEventListener('submit', e => {
      e.preventDefault();
      const text = $('#recordText').value.trim();
      if (!text) { showToast('先说点什么或输入一段记录吧'); return; }
      const created = createRecords(text, state.preset);
      state.records.push(...created); save(); render(); $('#recordDialog').close();
      showToast(`已保存 ${created.length} 条记录`);
    });
    $('#generateHomeSummary').addEventListener('click', () => { renderHome(); showToast('小结已根据最新记录生成'); });
    $('#generateFullSummary').addEventListener('click', () => { renderHome(); showToast('小结已根据最新记录生成'); });

    render();
  </script>
</body>
</html>
